  default_prompt: "요구사항 해석, 영향 범위, acceptance criteria, non-goal, 위험 정리, 그리고 작업을 small/medium/large-clear/large-ambiguous로 분류해야 하면 $change-analysis를 사용한다. 문서 분석은 독립적인 질문 단위로 병렬 explorer를 우선 고려한다."
policy:
