interface:
  display_name: "HS Init Project Harness"
  short_description: "Bootstrap Codex repo structure with required planner/generator/evaluator harness and starter local skills"
  default_prompt: "Use $hs-init-project to initialize or retrofit a repository with Codex AGENTS structure, `rule/index.md` plus `rule/rules/*.md` rule layout, required `.codex/config.toml` and `.codex/agents/*.toml` files, adaptive planner/generator/evaluator support, and starter local skills under `.codex/skills/`. Generated repositories must include `subagents_docs/` for cycle-backed working docs in the selected language, subagent-related rules under `rule/rules/`, and thin local skills written for implicit invocation through matching task descriptions and `allow_implicit_invocation` metadata rather than static role binding. Generated `.codex/agents/planner.toml`, `.codex/agents/generator.toml`, and `.codex/agents/evaluator.toml` must default to `model_reasoning_effort = \"high\"` while allowing task-specific adjustment. Generated structure must use a single source-root plus non-runtime boundary model rather than multiple top-level runtime directories. Do not treat analysis-only, question-only, review-only, or explanation-only requests as implementation work, and do not start materialization or implementation activity without an explicit implementation/change/materialization request. Generated harness rules should let the main agent choose among `main/generator -> evaluator`, `main(plan+implementation) -> evaluator`, `main-led decomposition + delegated implementation + evaluator`, and `parallel explorer analysis + planner assist if needed + main-approved plan + delegated implementation + evaluator`. The main agent may autonomously invoke subagents when needed, and document analysis should prefer parallel explorers when the questions are independent. Evaluator remains separate and must validate the implemented result against the plan and acceptance criteria by directly exercising the representative user surface when one exists, prioritizing browser/simulator/runtime/CLI/API entrypoints over indirect evidence. If direct user-surface validation is unavailable, the evaluator must record why, what environment is missing, what substitute validation was used, and why any critical unverified surface cannot be soft-passed. If subagents are slow, the coordinator may wait, but it must close completed or no-longer-needed threads immediately after integrating their outputs and perform cleanup before continuing when stale sessions or thread limits block new delegation. If language is not already fixed in the request or session, first send only the plain-text lines `1. English` and `2. Korean(한국어)`, then wait. Do not ask for chooser or submit UI. In existing repositories, inspect first, ask the smallest missing structural questions, and only then materialize files."
policy:
  allow_implicit_invocation: true
