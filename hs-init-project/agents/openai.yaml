interface:
  display_name: "HS Init Project Harness"
  short_description: "Bootstrap Codex repo structure with required planner/generator/evaluator harness and starter local skills"
  default_prompt: "Use $hs-init-project to initialize or retrofit a repository with Codex AGENTS structure, `rule/index.md` plus `rule/rules/*.md` rule layout, required `.codex/config.toml` and `.codex/agents/*.toml` files, a mandatory role-separated planner/generator/evaluator harness, and starter local skills under `.codex/skills/`. Generated repositories must include `subagents_docs/` for planner/generator/evaluator working docs in the selected language, `docs/guide/subagent-workflow.md` for the user-facing harness flow, subagent-related rules under `rule/rules/`, and thin local skills written for implicit invocation through matching task descriptions and `allow_implicit_invocation` metadata rather than static role binding. Do not treat analysis-only, question-only, review-only, or explanation-only requests as implementation work, and do not start materialization or generator activity without an explicit implementation/change/materialization request. The harness order is planner -> generator -> evaluator, the main agent remains orchestration-only unless the user explicitly waives the split, evaluator checks the implemented result against the plan and acceptance criteria, and re-planning happens only after evaluator reports failures or blockers. If subagents are slow, the coordinator may wait, but it must close completed or no-longer-needed threads after integrating their outputs and perform cleanup before continuing when stale sessions or thread limits block new delegation. If language is not already fixed in the request or session, first send only the plain-text lines `1. English` and `2. Korean(한국어)`, then wait. Do not ask for chooser or submit UI. In existing repositories, inspect first, ask the smallest missing structural questions, and only then materialize files."
policy:
  allow_implicit_invocation: true
