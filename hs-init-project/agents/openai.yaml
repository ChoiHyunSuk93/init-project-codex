interface:
  display_name: "HS Init Project Harness"
  short_description: "Bootstrap Codex repo structure and optional planner/generator/evaluator harness"
  default_prompt: "Use $hs-init-project to initialize or retrofit a repository with Codex AGENTS structure, `rule/index.md` plus `rule/rules/*.md` rule layout, and safe GitHub workflow rules. When requested, add a role-separated planner/generator/evaluator harness on top of the existing README/rule/docs model without collapsing the roles. For generated repositories, use `subagents_docs/` for planner/generator/evaluator working docs in the selected language, keep `docs/guide/` and `docs/implementation/` user-facing only, keep `docs/implementation/` category-based, and write short readable final briefings inside those categories after evaluator pass. The harness order is planner -> generator -> evaluator, the main agent remains orchestration-only unless the user explicitly waives the split, evaluator checks the implemented result against the plan and acceptance criteria, and re-planning happens only after evaluator reports failures or blockers. If subagents are slow, do not directly implement in place of them; wait or re-plan. If language is not already fixed in the request or session, first send only the plain-text lines `1. English` and `2. Korean(한국어)`, then wait. Do not ask for chooser or submit UI. In existing repositories, inspect first, ask the smallest missing structural questions, and only then materialize files."
policy:
  allow_implicit_invocation: true
