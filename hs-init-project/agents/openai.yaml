interface:
  display_name: "HS Init Project Harness"
  short_description: "Bootstrap repo rules and docs on top of project-scoped OMX setup with team-first and Ralph-led completion"
  default_prompt: "Use $hs-init-project to initialize or retrofit a repository by first running `omx setup --scope project`, then layering repository-specific `rule/index.md`, `rule/rules/*.md`, `docs/guide/`, and `docs/implementation/` structure on top of the OMX-managed `.codex/`, `.omx/`, prompts, skills, agents, and root `AGENTS.md`. After setup, revise the OMX-generated root `AGENTS.md` so it references the detailed rules, enforces documentation boundaries, treats `omx team` / `$team` as the default worker execution surface, requires at least three distinct team lanes or subagents for planning / implementation / evaluation, allows further task-specific specialization on top of that minimum split, blocks team launch from a pre-existing dirty workspace by default, requires a preservation commit before team start when the workspace is dirty, and keeps the leader in a Ralph-style verification loop until fresh evidence shows PASS. Do not create `subagents_docs/`; OMX runtime state handles internal team coordination, and the durable human-facing output is the final briefing under `docs/implementation/`. If the selected language is Korean, include Korean magic-keyword aliases in that root AGENTS revision alongside the default English OMX mappings."
policy:
  allow_implicit_invocation: true
