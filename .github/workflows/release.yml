name: Release Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          case "$TAG_NAME" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Tag must match v<major>.<minor>.<patch>: $TAG_NAME" >&2
              exit 1
              ;;
          esac

      - name: Validate skill bundle
        run: |
          test -f hs-init-project/SKILL.md
          test -f hs-init-project/agents/openai.yaml
          test -f hs-init-project/scripts/materialize_repo.sh
          test -f hs-init-project/scripts/update-skill-release.py
          python3 -m py_compile hs-init-project/scripts/update-skill-release.py
          python3 hs-init-project/scripts/update-skill-release.py --help >/dev/null
          sh -n hs-init-project/scripts/materialize_repo.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
